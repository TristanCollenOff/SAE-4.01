<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Créer un compte - Rythmo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

  {% include 'includes/theme-default-styles.html' %}

  <style>
    .register-card {
      animation: registerDrop 1.05s cubic-bezier(.36,1.6,.44,1) 0.1s both;
      width: 320px;
    }

    @keyframes registerDrop {
      from { transform: translateY(-80px); opacity: 0; }
      60% { transform: translateY(18px); opacity: 0.98; }
      to { transform: translateY(0); opacity: 1; }
    }

    .register-card form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 1.4rem;
    }

    .register-card form .form-control {
      margin-bottom: 0 !important;
    }

    .btn-pokedex {
      margin-bottom: 1.2rem;
      margin-top: 0.2rem;
      width: 100%;
      color: #ffc107;
      border: 1px solid #ffc107;
      background: transparent;
      font-weight: bold;
    }

    .btn-pokedex:hover {
      background: #ffc107;
      color: #1a060c;
    }

    .register-card .register-footer {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      margin-top: 0.8rem;
    }

    .register-card .register-footer p {
      color: #fff;
      margin: 0;
      text-align: center;
    }

    .register-card .register-footer a {
      color: #ffc107;
      text-decoration: none;
      font-weight: bold;
    }

    .register-card .register-footer a:hover {
      text-decoration: underline;
    }

    .register-card .error-msg {
      margin-bottom: 1.4rem;
    }
  </style>
</head>

<body class="default auth-page">
  {% include 'includes/theme-default-bg.html' %}

  <div class="register-card auth-card">
    <h1 class="mb-4"><i class="bi bi-person-circle"></i> Créer un compte</h1>

    {% if msg_error %}
      <div class="error-msg">
        <i class="bi bi-exclamation-triangle-fill"></i> {{ msg_error }}
      </div>
    {% endif %}

    <form action="{{ url_for('register.register') }}" method="post">
      <input type="text" class="form-control" placeholder="Nom d'utilisateur" name="username" required>
      <input type="text" class="form-control" placeholder="Prénom" name="prenom" required>
      <input type="text" class="form-control" placeholder="Nom" name="nom" required>
      <input type="email" class="form-control" placeholder="Email" name="email" required>
      <input type="password" class="form-control" placeholder="Mot de passe (10+ caractères)" name="password" required>
      <button type="submit" class="btn btn-pokedex">S'inscrire</button>
    </form>

    <div class="register-footer">
      <p>Vous avez déjà un compte ?</p>
      <a href="{{ url_for('login') }}">Se connecter</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
