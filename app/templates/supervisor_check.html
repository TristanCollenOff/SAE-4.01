{% extends "layout.html" %}

{% block content %}

<div class="verify-page">

  <div class="verify-card">

    <h2>🎧 Vérification Superviseur</h2>

    <p class="subtitle">Mot caché requis pour continuer</p>

    <div class="word-display">
      🎵 <span>{{ word }}</span> 🎵
    </div>

    <form method="POST" class="verify-form">

      <input
        type="text"
        name="secret_word"
        placeholder="Recopiez le mot"
        autocomplete="off"
        required
      >

      <button type="submit">Valider</button>

    </form>

    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}

  </div>

</div>

<style>

.verify-page{
  height: 80vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top, rgba(255,193,7,0.15), transparent);
}

.verify-card{
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  padding: 35px;
  border-radius: 20px;
  text-align:center;
  color:white;
  width: 350px;
  border: 1px solid rgba(255,255,255,0.2);
}

.subtitle{
  opacity:0.7;
  font-size: 0.9rem;
}

.word-display{
  margin: 25px 0;
  font-size: 2rem;
  font-weight: bold;
  letter-spacing: 5px;
  color: #ffc107;
}

.verify-form input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  margin-bottom:15px;
  outline:none;
  text-align:center;
}

.verify-form button{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  background:#ffc107;
  font-weight:bold;
  cursor:pointer;
}

.error{
  margin-top:10px;
  color:#ff6b6b;
}

</style>

{% endblock %}
