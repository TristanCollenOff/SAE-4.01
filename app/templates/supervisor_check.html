{% extends "layout.html" %}

{% block content %}

<div class="verify-page">

  <div class="verify-card">

    <h2>🎧 Vérification Marketing</h2>

    <p class="subtitle">Mot caché requis pour continuer</p>

    <div class="word-display" style="background: {{ captcha_style.background }}">
      <span class="captcha-text" style="
        font-size: {{ captcha_style.font_size }}px;
        letter-spacing: {{ captcha_style.letter_spacing }}px;
        transform: rotate({{ captcha_style.rotation }}deg);
        filter: blur({{ captcha_style.blur_amount }}px);
        opacity: {{ captcha_style.opacity }};
        color: rgba(255, 255, 255, 0.7);
      ">{{ captcha_style.word }}</span>
    </div>

    <form method="POST" class="verify-form">

      <input
        type="text"
        name="secret_word"
        placeholder="Entrez le mot en MAJUSCULES"
        autocomplete="off"
        required
      >

      <button type="submit">Valider</button>

    </form>

    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}

  </div>

</div>

<style>

.verify-page{
  height: 80vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top, rgba(255,193,7,0.15), transparent);
}

.verify-card{
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  padding: 35px;
  border-radius: 20px;
  text-align:center;
  color:white;
  width: 350px;
  border: 1px solid rgba(255,255,255,0.2);
}

.subtitle{
  opacity:0.7;
  font-size: 0.9rem;
}

.word-display{
  margin: 25px 0;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 40px;
  border-radius: 20px;
  border: 3px solid rgba(255,255,255,0.3);
  min-height: 120px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  backdrop-filter: blur(10px);
  position: relative;
  overflow: hidden;
}

.word-display::before{
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.1) 0%, transparent 50%);
  pointer-events: none;
}

.captcha-text{
  font-weight: bold;
  text-transform: uppercase;
  display: inline-block;
  text-shadow: 3px 3px 6px rgba(0,0,0,0.6);
  position: relative;
  z-index: 1;
}

.verify-form input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  margin-bottom:15px;
  outline:none;
  text-align:center;
}

.verify-form button{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  background:#ffc107;
  font-weight:bold;
  cursor:pointer;
}

.error{
  margin-top:10px;
  color:#ff6b6b;
}

</style>

{% endblock %}
