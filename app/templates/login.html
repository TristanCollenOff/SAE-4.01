<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Login to Rythmo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

  {% include 'includes/theme-default-styles.html' %}

  <style>
    .login-card {
      animation: loginDrop 1.05s cubic-bezier(.36,1.6,.44,1) 0.1s both;
      width: 320px;
    }

    @keyframes loginDrop {
      from { transform: translateY(-80px); opacity: 0; }
      60% { transform: translateY(18px); opacity: 0.98; }
      to { transform: translateY(0); opacity: 1; }
    }

    .text-warning-custom {
      color: #ffc107 !important;
    }

    .btn-login {
      background: transparent;
      border: 1px solid #ffc107;
      color: #ffc107;
      font-weight: bold;
    }

    .btn-login:hover {
      background: #ffc107;
      color: #1a060c;
    }
  </style>
</head>

<body class="default auth-page">
  {% include 'includes/theme-default-bg.html' %}

  <div class="login-card auth-card text-center">
    <div class="mb-4">
      <i class="bi bi-shield-lock-fill" style="font-size: 3rem;"></i>
      <h1 class="mt-2">Rythmo</h1>
      <p class="text-warning-custom">Identification</p>
    </div>

    <form action="/login" method="post">
      <div class="input-group mb-3">
        <span class="input-group-text"><i class="bi bi-person"></i></span>
        <input type="text" class="form-control mb-0" placeholder="Username"
               name="nom_utilisateur" required maxlength="50"
               value="{{ nom_utilisateur|default('') }}">
      </div>

      <div class="input-group mb-4">
        <span class="input-group-text"><i class="bi bi-key"></i></span>
        <input type="password" class="form-control mb-0" placeholder="Password"
               name="motdepasse" required maxlength="50" autocomplete="off">
      </div>

      <button class="btn btn-login w-100 shadow-sm" type="submit">Se connecter</button>
    </form>

    <p class="mt-3">
      <a href="{{ url_for('reset.reset_password') }}" class="text-warning-custom">Mot de passe oublié ?</a>
    </p>

    {% if msg_error %}
      <div class="alert alert-danger py-2 mt-3"
           style="background: rgba(220, 53, 69, 0.2); border: none; color: #ffb3b3;">
        <i class="bi bi-exclamation-circle"></i> {{ msg_error }}
      </div>
    {% endif %}

    {% if msg_info %}
      <div class="alert alert-info py-2 mt-3"
           style="background: rgba(0, 123, 255, 0.2); border: none; color: #b3d7ff;">
        <i class="bi bi-info-circle"></i> {{ msg_info }}
      </div>
    {% endif %}

    <p class="mt-3">
      Pas encore de compte ?
      <a href="{{ url_for('register.register') }}" class="fw-bold text-warning-custom">S'inscrire</a>
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
